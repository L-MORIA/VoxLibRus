project:
  name: VoxLibRus
  output_dir: ./output
  temp_dir: ./temp

book:
  extract:
    pdf_engine: pdfplumber
    epub_engine: ebooklib
    docx_engine: markitdown

reference:
  target_sample_rate: 24000
  noise_reduce: true
  trim_silence: true
  normalize_peak_db: -3

asr:
  primary: gigaam
  gigaam:
    model_id: ai-sage/GigaAM-v3
    revision: e2e_rnnt
    device: cpu           # RTX 5060 Ti (sm120) — нужен PyTorch 2.6+
  whisper:
    model_id: openai/whisper-large-v3
    device: cpu
    language: ru

tts:
  primary: f5tts
  qwen3:
    model_id: Qwen/Qwen3-TTS-12Hz-1.7B-Base
    device: cpu
    language: ru
    streaming: false
  f5tts:
    model_id: Misha24-10/F5-TTS_RUSSIAN
    device: cpu
    ref_audio_sample_rate: 24000
    variant: F5TTS_v1_Base_accent_tune

voice:
  profiles_dir: ~/.voxlib/speakers

generation:
  chunk_max_chars: 1000
  chunk_overlap_chars: 50
  save_every_n: 10
  clear_cache_every_n: 20
  max_retries: 3
  retry_delay: 5

audio:
  target_lufs: -16
  peak_dbfs: -1
  chapter_pause_sec: 2.5
  output:
    format: mp3
    mp3_bitrate: 192
