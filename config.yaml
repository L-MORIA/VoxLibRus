project:
  name: VoxLibRus
  output_dir: ./output
  temp_dir: ./temp

book:
  extract:
    pdf_engine: pdfplumber
    epub_engine: ebooklib
    docx_engine: markitdown

reference:
  target_sample_rate: 24000
  noise_reduce: true
  trim_silence: true
  normalize_peak_db: -3

asr:
  primary: gigaam
  gigaam:
    model_id: ai-sage/GigaAM-v3
    revision: e2e_rnnt
    device: cuda
  whisper:
    model_id: openai/whisper-large-v3
    device: cuda
    language: ru

tts:
  primary: f5tts
  qwen3:
    # Base — voice cloning из референса (3 сек) + генерация (secondary)
    model_id: Qwen/Qwen3-TTS-12Hz-1.7B-Base
    device: cuda
    language: ru
    streaming: false
    # ⚠️ НЕ поддерживает stress marks (+ нотацию от RUAccent)
    # См. https://github.com/QwenLM/Qwen3-TTS/discussions/53
  f5tts:
    # PRIMARY — поддерживает stress marks (+) + voice cloning
    model_id: Misha24-10/F5-TTS_RUSSIAN
    device: cuda
    ref_audio_sample_rate: 24000
    # Варианты: F5TTS_v1_Base | F5TTS_v1_Base_accent_tune | F5TTS_v1_Base_v2
    # accent_tune — с полной разметкой ударений, рекомендуется для качества
    variant: F5TTS_v1_Base_accent_tune

voice:
  profiles_dir: ~/.voxlib/speakers

generation:
  chunk_max_chars: 1000
  chunk_overlap_chars: 50
  save_every_n: 10
  clear_cache_every_n: 20
  max_retries: 3
  retry_delay: 5

audio:
  target_lufs: -16
  peak_dbfs: -1
  chapter_pause_sec: 2.5
  output:
    format: mp3
    mp3_bitrate: 192
