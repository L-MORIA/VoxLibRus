project:
  name: VoxLibRus
  output_dir: ./output
  temp_dir: ./temp

book:
  extract:
    pdf_engine: pdfplumber
    epub_engine: ebooklib
    docx_engine: markitdown

reference:
  target_sample_rate: 24000
  noise_reduce: true
  trim_silence: true
  normalize_peak_db: -3

asr:
  primary: gigaam
  gigaam:
    model_id: ai-sage/GigaAM-v3
    revision: e2e_rnnt
    device: cuda
  whisper:
    model_id: openai/whisper-large-v3
    device: cpu
    language: ru

tts:
  primary: f5tts
  qwen3:
    model_id: Qwen/Qwen3-TTS-12Hz-1.7B-Base
    device: cuda
    language: ru
    streaming: false
  f5tts:
    model_id: Misha24-10/F5-TTS_RUSSIAN
    device: cuda
    ref_audio_sample_rate: 24000
    variant: F5TTS_v1_Base_accent_tune
    # vocoder: bigvgan  # раскомментировать для BigVGAN (экспериментально)

voice:
  profiles_dir: ~/.voxlib/speakers

generation:
  chunk_max_chars: 1000
  chunk_overlap_chars: 50
  save_every_n: 10
  clear_cache_every_n: 20
  max_retries: 3
  retry_delay: 5

qa_gate:
  enabled: true
  rms_min_db: -45.0
  rms_max_db: -3.0
  peak_max: 0.99
  dc_offset_max: 0.05
  duration_min_sec: 0.5
  duration_max_sec: 120.0   # one book chunk can be up to ~60s of speech
  silence_threshold_db: -60.0
  max_silence_ratio: 0.6   # was 0.4 — too strict, rejected chunks with natural pauses
  max_retries: 3

audio:
  target_lufs: -20
  peak_dbfs: -3
  chapter_pause_sec: 2.5
  output:
    format: wav        # wav (24-bit, для Audition) или mp3
    mp3_bitrate: 320   # для MP3 (не используется при wav)
