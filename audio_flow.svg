<svg xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="820" fill="#1a1a2e" rx="8"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">Путь аудиосигнала в VoxLibRus</text>
  <line x1="50" y1="42" x2="850" y2="42" stroke="#333" stroke-width="1"/>

  <!-- ===== REFERENCE ===== -->
  <rect x="50" y="60" width="800" height="130" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="70" y="82" fill="#e94560" font-size="14" font-weight="bold">ЭТАП 1: ПОДГОТОВКА РЕФЕРЕНСА (prepare_reference)</text>
  
  <rect x="70" y="95" width="140" height="50" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="140" y="118" text-anchor="middle" fill="#ccc" font-size="12">Исходный WAV</text>
  <text x="140" y="135" text-anchor="middle" fill="#888" font-size="11">48/44.1/24/16 kHz</text>
  
  <line x1="210" y1="120" x2="245" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="250" y="95" width="140" height="50" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="320" y="112" text-anchor="middle" fill="#ccc" font-size="12">Resample → 24 kHz</text>
  <text x="320" y="128" text-anchor="middle" fill="#888" font-size="11">Mono / trim silence</text>
  <text x="320" y="142" text-anchor="middle" fill="#888" font-size="11">Noise gate (afftdn)</text>
  
  <line x1="390" y1="120" x2="425" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="430" y="95" width="150" height="50" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="505" y="112" text-anchor="middle" fill="#ccc" font-size="12">Normalize peak</text>
  <text x="505" y="128" text-anchor="middle" fill="#888" font-size="11">→ −3 dB</text>
  
  <line x1="580" y1="120" x2="615" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="620" y="95" width="140" height="50" rx="6" fill="#1a5520" stroke="#2d8a3e" stroke-width="1.5"/>
  <text x="690" y="112" text-anchor="middle" fill="#ccc" font-size="12">Готовый референс</text>
  <text x="690" y="128" text-anchor="middle" fill="#8f8" font-size="11">24 kHz / 16-bit / Mono</text>
  <text x="690" y="142" text-anchor="middle" fill="#8f8" font-size="11">10–15 сек</text>

  <text x="70" y="170" fill="#999" font-size="11">↓ ASR (GigaAM) транскрибирует речь в текст. Текст + аудио = пара для F5-TTS</text>
  
  <!-- ===== F5-TTS GENERATION ===== -->
  <rect x="50" y="205" width="800" height="220" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="70" y="227" fill="#e94560" font-size="14" font-weight="bold">ЭТАП 2: ГЕНЕРАЦИЯ (F5-TTS_RUSSIAN)</text>

  <rect x="70" y="245" width="180" height="60" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="160" y="265" text-anchor="middle" fill="#ccc" font-size="12">Вход: текст чанка</text>
  <text x="160" y="282" text-anchor="middle" fill="#ccc" font-size="12">+ референс (audio+text)</text>
  <text x="160" y="298" text-anchor="middle" fill="#888" font-size="11">~60–80 символов</text>

  <line x1="250" y1="275" x2="295" y2="275" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="300" y="240" width="200" height="70" rx="6" fill="#1a1a40" stroke="#e94560" stroke-width="1.5"/>
  <text x="400" y="260" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">DiT-модель</text>
  <text x="400" y="278" text-anchor="middle" fill="#ccc" font-size="11">Вычисляет mel-спектрограмму</text>
  <text x="400" y="294" text-anchor="middle" fill="#ccc" font-size="11">через diffusion steps</text>
  <text x="400" y="308" text-anchor="middle" fill="#888" font-size="11">~5.4B параметров</text>

  <line x1="500" y1="275" x2="545" y2="275" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="550" y="245" width="180" height="60" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="640" y="265" text-anchor="middle" fill="#ccc" font-size="12">Mel → Audio</text>
  <text x="640" y="282" text-anchor="middle" fill="#ccc" font-size="12">(Vocos / BigVGAN)</text>
  <text x="640" y="298" text-anchor="middle" fill="#888" font-size="11">80 или 100 mel-band</text>

  <line x1="730" y1="275" x2="765" y2="275" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="770" y="245" width="60" height="60" rx="6" fill="#1a5520" stroke="#2d8a3e" stroke-width="1.5"/>
  <text x="800" y="268" text-anchor="middle" fill="#ccc" font-size="11">WAV</text>
  <text x="800" y="282" text-anchor="middle" fill="#ccc" font-size="11">чанка</text>
  <text x="800" y="296" text-anchor="middle" fill="#888" font-size="10">24 kHz</text>

  <!-- Key technical note -->
  <rect x="70" y="325" width="760" height="85" rx="4" fill="#0d0d20" stroke="#333" stroke-width="1"/>
  <text x="85" y="345" fill="#f0c040" font-size="12" font-weight="bold">⚠ Как F5-TTS определяет длительность чанка:</text>
  <text x="85" y="365" fill="#ccc" font-size="11">F5-TTS не просто «читает текст» — он копирует ритм/темп из референса.</text>
  <text x="85" y="382" fill="#ccc" font-size="11">Формула (при fix_duration=None):</text>
  <text x="85" y="399" fill="#8cf" font-size="12">длина_чанка = длина_референса × длина_текста_чанка / длина_текста_референса</text>

  <!-- ===== POST-PROCESSING ===== -->
  <rect x="50" y="440" width="800" height="130" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="70" y="462" fill="#e94560" font-size="14" font-weight="bold">ЭТАП 3: ПОСТ-ОБРАБОТКА</text>

  <rect x="70" y="478" width="130" height="50" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="135" y="500" text-anchor="middle" fill="#ccc" font-size="12">WAV чанка</text>
  <text x="135" y="516" text-anchor="middle" fill="#888" font-size="11">~5–60 сек</text>
  
  <line x1="200" y1="503" x2="230" y2="503" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="235" y="478" width="130" height="50" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="300" y="500" text-anchor="middle" fill="#ccc" font-size="12">QA Gate</text>
  <text x="300" y="516" text-anchor="middle" fill="#888" font-size="11">RMS / silence / clip</text>

  <line x1="365" y1="503" x2="395" y2="503" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="478" width="130" height="50" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="465" y="500" text-anchor="middle" fill="#ccc" font-size="12">Normalize</text>
  <text x="465" y="516" text-anchor="middle" fill="#888" font-size="11">EBU R128 → −20 LUFS</text>

  <line x1="530" y1="503" x2="560" y2="503" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="565" y="478" width="130" height="50" rx="6" fill="#1a1a40" stroke="#2a2a6a" stroke-width="1.5"/>
  <text x="630" y="500" text-anchor="middle" fill="#ccc" font-size="12">Assemble</text>
  <text x="630" y="516" text-anchor="middle" fill="#888" font-size="11">concat → MP3/M4B</text>

  <!-- ===== OUTPUT ===== -->
  <rect x="50" y="585" width="800" height="55" rx="6" fill="#16213e" stroke="#27ae60" stroke-width="1.5"/>
  <text x="70" y="610" fill="#2ecc71" font-size="14" font-weight="bold">ГОТОВО</text>
  <text x="450" y="610" text-anchor="middle" fill="#aaa" font-size="13">output/.../book.mp3  —  192 kbps, 24 kHz, stereo</text>
  <text x="450" y="628" text-anchor="middle" fill="#888" font-size="11">(опционально M4B с chapter marker-ами)</text>

  <!-- ===== BOTTOM: PROBLEM ZONES ===== -->
  <rect x="50" y="660" width="800" height="140" rx="6" fill="#1a1111" stroke="#c0392b" stroke-width="1"/>
  <text x="70" y="682" fill="#e74c3c" font-size="14" font-weight="bold">🔴 ГДЕ ЛОМАЕТСЯ КАЧЕСТВО</text>
  
  <text x="85" y="705" fill="#ccc" font-size="12">1. Референс &gt;20 сек → модель копирует длительность, чанки становятся огромными</text>
  <text x="85" y="722" fill="#ccc" font-size="12">2. Референс &lt;8 сек → мало фонем для точного клонирования тембра («звук из трубы»)</text>
  <text x="85" y="739" fill="#ccc" font-size="12">3. Шум в референсе → TTS копирует шум как часть голоса</text>
  <text x="85" y="756" fill="#ccc" font-size="12">4. ASR ошибки в транскрипции → модель «не понимает», что именно сказано в референсе</text>
  <text x="85" y="773" fill="#ccc" font-size="12">5. Громкость референса &lt;−10 dB → генерация слишком тихая, normalize поднимает шум</text>
</svg>
